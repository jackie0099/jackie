<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>auto jat lod/title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --accent: #0ea5e9; --bg-dark: #0f172a; --card: #ffffff; --text: #1e293b; --radius: 16px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans Lao', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding-bottom: 120px; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        .panel { background: var(--card); color: var(--text); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 14px; background: #f8fafc; }
        .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .car-card { background: white; color: var(--text); padding: 15px; border-radius: 12px; border-left: 8px solid #cbd5e1; position: relative; transition: 0.3s; cursor: pointer; }
        .car-card.selected { border-left-width: 15px; border-left-color: var(--accent); background: #f0f9ff; transform: translateY(-3px); }
        .car-card.busy { opacity: 0.7; background: #f1f5f9; cursor: not-allowed; }
        .plate { font-size: 1.6rem; font-weight: 800; display: block; color: #0f172a; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; font-weight: bold; }
        .btn-action { width: 100%; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #waBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #22c55e; color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 700; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(34,197,94,0.4); z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0;">ລະບົບຈັດລົດ by jackie ctv <span style="color:var(--accent)">v25.6</span></h2>
        <button onclick="toggleAdmin()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">⚙️ ຈັດການລົດ</button>
    </header>

    <div id="adminPanel" class="panel" style="display:none; border: 2px dashed var(--accent);">
        <h3 style="margin-top:0;">➕ ເພີ່ມລົດໃໝ່</h3>
        <div class="grid-inputs">
            <input type="text" id="addP" placeholder="ທະບຽນລົດ">
            <input type="text" id="addD" placeholder="ຊື່ຄົນຂັບ">
            <input type="text" id="addPh" placeholder="ເเบີໂທ">
        </div>
        <button onclick="manageCar('ADD_CAR')" style="width:100%; padding:12px; background:#0f172a; color:white; border-radius:10px; border:none; cursor:pointer;">💾 ບັນທຶກລົດລົງ Sheet</button>
    </div>

    <div class="panel">
        <label>📋 ວາງຂໍ້ຄວາມ WhatsApp ເພື່ອດຶງຂໍ້ມູນ</label>
        <textarea id="rawWA" rows="3" placeholder="ວາງຂໍ້ຄວາມທີ່ນີ້..." oninput="smartParse()"></textarea>
        <div class="grid-inputs" style="margin-top:15px;">
            <input type="text" id="tid" placeholder="🆔 ID ทัวร์">
            <input type="number" id="qty" placeholder="🔢 จำนวนรถ">
        </div>
        <div class="grid-inputs">
            <input type="datetime-local" id="start">
            <input type="datetime-local" id="end">
        </div>
        <input type="text" id="loc" placeholder="📍 รายละเอียดทัวร์" style="margin-top:10px;">
        <button onclick="fifoMatch()" class="btn-action" style="background:var(--primary); color:white; margin-top:15px;">⚖️ เลือกรถอัตโนมัติ (FIFO)</button>
    </div>

    <div id="fleetGrid" class="fleet-grid"></div>
</div>

<button id="waBtn" onclick="saveAndSend()"> ບັນທຶກ & ສົ່ງ WhatsApp</button>

<script>
    // 🔗 URL ล่าสุดของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbyotDMu_8YGEQJOyVJsQPq0VhurkVk6KdFuuD3YUoIw9srixW1_0BbMn5vNgGBtUo_U/exec";
    const PALETTE = ["#e1f5fe", "#f3e5f5", "#e8f5e9", "#fff3e0", "#efebe9", "#fce4ec", "#e0f2f1"];

    let fleet = []; let cloudData = []; let selectedPlates = []; let isAdminMode = false;

    async function syncData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            fleet = data.fleet || [];
            cloudData = data.activeStatus || [];
            render();
        } catch (e) { console.error("Sync Error:", e); render(); }
    }

    function smartParse() {
        const t = document.getElementById('rawWA').value;
        const year = 2026;
        const idM = t.match(/([0-9]{4}[A-Z])/i); if(idM) document.getElementById('tid').value = idM[0];
        const qM = t.match(/(\d+)\s*(ຄັນ|คัน)/); if(qM) document.getElementById('qty').value = qM[1];

        const dRegex = /(\d{1,2})[\/\-](\d{1,2})/g;
        const tRegex = /(\d{1,2})[:.](\d{2})/g;
        let dFound = []; let tmFound = []; let d; let tm;
        while ((d = dRegex.exec(t)) !== null) dFound.push({ d: d[1].padStart(2,'0'), m: d[2].padStart(2,'0'), idx: d.index });
        while ((tm = tRegex.exec(t)) !== null) tmFound.push({ h: tm[1].padStart(2,'0'), i: tm[2], idx: tm.index });

        if(dFound.length >= 1) {
            const sD = dFound[0]; const sT = tmFound.find(x => x.idx > sD.idx) || { h: "08", i: "00" };
            document.getElementById('start').value = `${year}-${sD.m}-${sD.d}T${sT.h}:${sT.i}`;
        }
        if(dFound.length >= 2) {
            const eD = dFound[dFound.length - 1]; const eT = tmFound.filter(x => x.idx > eD.idx).pop() || { h: "17", i: "00" };
            document.getElementById('end').value = `${year}-${eD.m}-${eD.d}T${eT.h}:${eT.i}`;
        }
        const lines = t.split('\n');
        document.getElementById('loc').value = lines.filter(l => l.includes("ຮັບ") || l.includes("ສົ່ງ") || l.includes("ທ່ຽວ")).join(" | ").replace(/[.:]+/g, '').trim();
        render();
    }

    function render() {
        const container = document.getElementById('fleetGrid');
        const tid = document.getElementById('tid').value || "SEL";
        container.innerHTML = '';

        fleet.forEach(car => {
            const busyJob = cloudData.find(c => c.plate === car.plate && c.status === "Busy");
            const isSelected = selectedPlates.includes(car.plate);
            let tourColor = busyJob ? getTourColor(busyJob.tourName) : (isSelected ? getTourColor(tid) : "#cbd5e1");
            
            const card = document.createElement('div');
            card.className = `car-card ${isSelected ? 'selected' : ''} ${busyJob ? 'busy' : ''}`;
            card.style.borderLeftColor = tourColor;
            if(isSelected || busyJob) card.style.backgroundColor = tourColor + "22"; 

            card.innerHTML = `
                <div class="badge" style="background:${tourColor}; color:#000;">${busyJob ? busyJob.tourName : (isSelected ? 'ເລືອກແລ້ວ' : 'ຫວ່າງ')}</div>
                <div class="plate">${car.plate}</div>
                <div style="font-weight:700;">👤 ${car.driver}</div>
                <div style="font-size:14px;"><a href="tel:${car.phone}" style="color:var(--accent); font-weight:bold; text-decoration:none;">📞 ${car.phone}</a></div>
                <div style="margin-top:10px;">
                    ${busyJob ? `<button class="btn-action" style="background:var(--primary); color:white;" onclick="event.stopPropagation(); manageCar('RESET_SINGLE', '${car.plate}')">🔄 Reset ຫວ່າງ</button>` : ''}
                </div>
            `;
            if(!busyJob && !isAdminMode) card.onclick = () => {
                const i = selectedPlates.indexOf(car.plate);
                if(i > -1) selectedPlates.splice(i, 1); else selectedPlates.push(car.plate);
                render();
            };
            container.appendChild(card);
        });
    }

    async function manageCar(action, plate = '') {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: action, plate: plate }) });
        setTimeout(syncData, 1500);
    }

    async function saveAndSend() {
        const tid = document.getElementById('tid').value;
        const selCars = fleet.filter(f => selectedPlates.includes(f.plate));
        if(!tid || !selCars.length) return alert("ຂໍ້ມູນບໍ່ຄົບ!");

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
            action: "SAVE_TOUR", tourName: tid, tourLoc: document.getElementById('loc').value,
            startTime: document.getElementById('start').value, endTime: document.getElementById('end').value,
            selectedCars: selCars
        })});
        
        let msg = *ແຈ້ງລົດທົວ: ${tid}*\n📍 *ລາຍລະອຽດ:* ${document.getElementById('loc').value}\n----------\n`;
        selCars.forEach((c, i) => msg += `${i+1}. ✅ *${c.plate}* (${c.driver}) 📞 ${c.phone}\n`);
        window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
        selectedPlates = []; setTimeout(syncData, 1500);
    }

    function getTourColor(id) {
        let hash = 0; for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
        return PALETTE[Math.abs(hash) % PALETTE.length];
    }
    function toggleAdmin() { isAdminMode = !isAdminMode; document.getElementById('adminPanel').style.display = isAdminMode ? 'block' : 'none'; render(); }
    function fifoMatch() {
        const q = parseInt(document.getElementById('qty').value) || 0;
        const busyP = new Set(cloudData.filter(d => d.status === "Busy").map(d => d.plate));
        let free = fleet.filter(c => !busyP.has(c.plate));
        free.sort((a, b) => {
            const lastA = cloudData.filter(d => d.plate === a.plate).pop();
            const lastB = cloudData.filter(d => d.plate === b.plate).pop();
            return (lastA ? new Date(lastA.timestamp) : 0) - (lastB ? new Date(lastB.timestamp) : 0);
        });
        selectedPlates = free.slice(0, q).map(c => c.plate);
        render();
    }

    window.onload = syncData; setInterval(syncData, 1000);
</script>
</body>
</html>
